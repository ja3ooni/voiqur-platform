# Main EUVoice Platform API
# Image: voiquyr/api:latest  (built from root Dockerfile)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: voiquyr
  labels:
    app: api
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: api
        image: voiquyr/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ENABLE_DOCS
          value: "false"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: redis-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: jwt-secret-key
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: mistral-api-key
              optional: true
        - name: DEEPGRAM_API_KEY
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: deepgram-api-key
              optional: true
        - name: ELEVENLABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: elevenlabs-api-key
              optional: true
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: voiquyr-secrets
              key: stripe-api-key
              optional: true
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "2"
            memory: "2Gi"
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: voiquyr
spec:
  ports:
  - port: 8000
    targetPort: http
    name: http
  selector:
    app: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: voiquyr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
