# ─────────────────────────────────────────────────────────────────────────────
# IMPORTANT: Do NOT commit real values here.
# Populate with kubectl:
#
#   kubectl create secret generic voiquyr-secrets \
#     --from-literal=jwt-secret-key="$(openssl rand -hex 32)" \
#     --from-literal=database-url="postgresql://postgres:PASSWORD@postgres:5432/euvoice" \
#     --from-literal=redis-url="redis://redis:6379" \
#     --from-literal=mistral-api-key="..." \
#     --from-literal=deepgram-api-key="..." \
#     --from-literal=elevenlabs-api-key="..." \
#     --from-literal=stripe-api-key="..." \
#     --from-literal=gemini-api-key="..." \
#     -n voiquyr
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: voiquyr-secrets
  namespace: voiquyr
type: Opaque
# stringData values are placeholders — replace before applying
stringData:
  jwt-secret-key: "REPLACE_ME"
  database-url: "postgresql://postgres:REPLACE_ME@postgres:5432/euvoice"
  redis-url: "redis://redis:6379"
  mistral-api-key: ""
  deepgram-api-key: ""
  elevenlabs-api-key: ""
  stripe-api-key: ""
  gemini-api-key: ""
