# React Dashboard
# Image: voiquyr/dashboard:latest  (built from frontend/Dockerfile)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: voiquyr
  labels:
    app: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: voiquyr/dashboard:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: voiquyr
spec:
  ports:
  - port: 80
    targetPort: http
    name: http
  selector:
    app: dashboard
