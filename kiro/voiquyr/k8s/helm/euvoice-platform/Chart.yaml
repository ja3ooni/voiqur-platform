apiVersion: v2
name: euvoice-platform
description: EUVoice AI Multi-Agent Voice Assistant Platform
type: application
version: 0.1.0
appVersion: "0.1.0"
home: https://github.com/euvoice/euvoice-ai
sources:
  - https://github.com/euvoice/euvoice-ai
maintainers:
  - name: EUVoice Team
    email: team@euvoice.ai
keywords:
  - voice-assistant
  - ai
  - multi-agent
  - eu-compliance
  - speech-recognition
  - text-to-speech
annotations:
  category: AI/ML
  licenses: Apache-2.0
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: prometheus
    version: 15.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: 6.x.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled