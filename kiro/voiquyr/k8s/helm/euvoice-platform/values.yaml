# ─────────────────────────────────────────────────────────────────────────────
# EUVoice AI Platform — Helm Values
#
# Images produced by the Dockerfiles in this repo:
#   api                  → Dockerfile (root)
#   command-center-api   → voiquyr-command-center/backend/Dockerfile
#   dashboard            → frontend/Dockerfile
#   command-center-ui    → voiquyr-command-center/frontend/Dockerfile
# ─────────────────────────────────────────────────────────────────────────────

global:
  region: "eu-central-1"
  dataResidency: "eu"
  gdprCompliance: true
  aiActCompliance: true

  # Set to your registry, e.g. "ghcr.io/your-org" or "registry.eu-central-1.amazonaws.com"
  imageRegistry: ""
  imagePullSecrets: []

  storageClass: "gp3-encrypted"

  networkPolicies:
    enabled: true
    denyAll: false

# ── Namespace ─────────────────────────────────────────────────────────────────
namespace:
  create: true
  name: "voiquyr"
  labels:
    compliance: "gdpr"
    region: "eu"
  annotations:
    "compliance.euvoice.ai/gdpr": "enabled"
    "compliance.euvoice.ai/ai-act": "enabled"

resourceQuota:
  enabled: true
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    persistentvolumeclaims: "20"
    services: "20"
    secrets: "30"
    configmaps: "30"

# ── Main Platform API ─────────────────────────────────────────────────────────
api:
  enabled: true
  replicaCount: 2
  image:
    repository: voiquyr/api
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  env:
    ENVIRONMENT: "production"
    LOG_LEVEL: "INFO"
    ENABLE_DOCS: "false"

# ── Command Center API ────────────────────────────────────────────────────────
commandCenterApi:
  enabled: true
  replicaCount: 1
  image:
    repository: voiquyr/command-center-api
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8001

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

# ── Dashboard (React) ─────────────────────────────────────────────────────────
dashboard:
  enabled: true
  replicaCount: 2
  image:
    repository: voiquyr/dashboard
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

# ── Command Center UI (Vite) ──────────────────────────────────────────────────
commandCenterUi:
  enabled: true
  replicaCount: 1
  image:
    repository: voiquyr/command-center-ui
    tag: "latest"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ── PostgreSQL (Bitnami) ──────────────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    postgresPassword: "changeme-use-secret"
    database: "euvoice"
  primary:
    persistence:
      enabled: true
      size: "20Gi"
      storageClass: "gp3-encrypted"
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  metrics:
    enabled: true

# ── Redis (Bitnami) ───────────────────────────────────────────────────────────
redis:
  enabled: true
  auth:
    enabled: true
    password: "changeme-use-secret"
  master:
    persistence:
      enabled: true
      size: "8Gi"
      storageClass: "gp3-encrypted"
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

# ── Secrets (override at deploy time — never commit real values) ──────────────
secrets:
  jwtSecretKey: ""
  mistralApiKey: ""
  deepgramApiKey: ""
  elevenlabsApiKey: ""
  stripeApiKey: ""
  twilioAccountSid: ""
  twilioAuthToken: ""
  geminiApiKey: ""

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.voiquyr.eu
      paths:
        - path: /
          pathType: Prefix
          service: api
    - host: app.voiquyr.eu
      paths:
        - path: /
          pathType: Prefix
          service: dashboard
    - host: command.voiquyr.eu
      paths:
        - path: /api
          pathType: Prefix
          service: commandCenterApi
        - path: /
          pathType: Prefix
          service: commandCenterUi
  tls:
    - secretName: voiquyr-tls
      hosts:
        - api.voiquyr.eu
        - app.voiquyr.eu
        - command.voiquyr.eu

# ── Monitoring ────────────────────────────────────────────────────────────────
monitoring:
  prometheus:
    enabled: true
    retention: "30d"
    storageSize: "20Gi"
  grafana:
    enabled: true
    adminPassword: "changeme"
    persistence:
      enabled: true
      size: "5Gi"
  jaeger:
    enabled: false

# ── Security ──────────────────────────────────────────────────────────────────
security:
  networkPolicies:
    enabled: true
  podSecurityPolicy:
    enabled: false   # deprecated in k8s 1.25+; use Pod Security Admission instead
  rbac:
    enabled: true
  encryption:
    atRest: true
    inTransit: true
  auditLogging:
    enabled: true
    retention: "7y"

# ── Istio (optional) ──────────────────────────────────────────────────────────
istio:
  enabled: false
  gateway:
    enabled: false
    hosts:
      - "api.voiquyr.eu"
      - "app.voiquyr.eu"
