apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # JWT secret for API authentication
  jwt-secret: {{ randAlphaNum 32 | b64enc | quote }}
  
  # Encryption keys for GDPR compliance
  data-encryption-key: {{ randAlphaNum 32 | b64enc | quote }}
  
  # API keys for external services
  huggingface-token: {{ .Values.secrets.huggingfaceToken | default "" | b64enc | quote }}
  
  # Webhook secrets
  webhook-secret: {{ randAlphaNum 24 | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
type: Opaque
data:
  password: {{ .Values.postgresql.auth.postgresPassword | b64enc | quote }}
  username: {{ "postgres" | b64enc | quote }}
  database: {{ .Values.postgresql.auth.database | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-redis
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: cache
type: Opaque
data:
  password: {{ .Values.redis.auth.password | b64enc | quote }}
---
{{- if .Values.monitoring.grafana.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-grafana
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
type: Opaque
data:
  admin-password: {{ .Values.monitoring.grafana.adminPassword | b64enc | quote }}
  admin-user: {{ "admin" | b64enc | quote }}
{{- end }}