apiVersion: v1
kind: Secret
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-secrets
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets
  annotations:
    # Rotate these secrets regularly. Never commit real values.
    "compliance.euvoice.ai/secret-rotation": "required"
type: Opaque
stringData:
  # Connection strings — built from postgresql/redis sub-chart values
  database-url: "postgresql://postgres:{{ .Values.postgresql.auth.postgresPassword }}@{{ include "euvoice-platform.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  redis-url: "redis://:{{ .Values.redis.auth.password }}@{{ include "euvoice-platform.fullname" . }}-redis-master:6379"

  # Auth
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | default (randAlphaNum 32) | quote }}

  # External API keys (set via --set secrets.X=... at deploy time)
  mistral-api-key: {{ .Values.secrets.mistralApiKey | quote }}
  deepgram-api-key: {{ .Values.secrets.deepgramApiKey | quote }}
  elevenlabs-api-key: {{ .Values.secrets.elevenlabsApiKey | quote }}
  stripe-api-key: {{ .Values.secrets.stripeApiKey | quote }}
  twilio-account-sid: {{ .Values.secrets.twilioAccountSid | quote }}
  twilio-auth-token: {{ .Values.secrets.twilioAuthToken | quote }}
  gemini-api-key: {{ .Values.secrets.geminiApiKey | quote }}

  # Internal secrets
  webhook-secret: {{ randAlphaNum 24 | quote }}
  data-encryption-key: {{ randAlphaNum 32 | quote }}
