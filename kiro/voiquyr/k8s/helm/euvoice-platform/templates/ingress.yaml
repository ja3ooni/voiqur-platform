{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "euvoice-platform.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
  - host: {{ .host }}
    http:
      paths:
      {{- range .paths }}
      - path: {{ .path }}
        pathType: {{ .pathType }}
        backend:
          service:
            {{- if eq .service "api" }}
            name: {{ include "euvoice-platform.fullname" $ }}-api
            port:
              number: {{ $.Values.api.service.port }}
            {{- else if eq .service "dashboard" }}
            name: {{ include "euvoice-platform.fullname" $ }}-dashboard
            port:
              number: {{ $.Values.dashboard.service.port }}
            {{- else if eq .service "commandCenterApi" }}
            name: {{ include "euvoice-platform.fullname" $ }}-cc-api
            port:
              number: {{ $.Values.commandCenterApi.service.port }}
            {{- else if eq .service "commandCenterUi" }}
            name: {{ include "euvoice-platform.fullname" $ }}-cc-ui
            port:
              number: {{ $.Values.commandCenterUi.service.port }}
            {{- end }}
      {{- end }}
  {{- end }}
{{- end }}
