{{- if .Values.sttAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-stt-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: stt-agent
spec:
  replicas: {{ .Values.sttAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "euvoice-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: stt-agent
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "euvoice-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: stt-agent
    spec:
      {{- include "euvoice-platform.podSecurityContext" . | nindent 6 }}
      {{- include "euvoice-platform.affinity" . | nindent 6 }}
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: stt-agent
        image: {{ include "euvoice-platform.image" .Values.sttAgent.image }}
        imagePullPolicy: {{ .Values.sttAgent.image.pullPolicy }}
        {{- include "euvoice-platform.securityContext" . | nindent 8 }}
        ports:
        - name: http
          containerPort: 8001
          protocol: TCP
        - name: grpc
          containerPort: 9001
          protocol: TCP
        - name: websocket
          containerPort: 8081
          protocol: TCP
        env:
        {{- include "euvoice-platform.complianceEnv" . | nindent 8 }}
        - name: FRAMEWORK_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-framework:8000"
        - name: MODEL_VOXTRAL_SMALL
          value: {{ .Values.sttAgent.models.voxtralSmall | quote }}
        - name: MODEL_VOXTRAL_MINI
          value: {{ .Values.sttAgent.models.voxtralMini | quote }}
        - name: MODEL_FALLBACK
          value: {{ .Values.sttAgent.models.fallback | quote }}
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        {{- include "euvoice-platform.resources" .Values.sttAgent | nindent 8 }}
        volumeMounts:
        - name: model-cache
          mountPath: /app/models
        - name: tmp
          mountPath: /tmp
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "euvoice-platform.fullname" . }}-stt-models
      - name: tmp
        emptyDir: {}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-stt-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: stt-agent
spec:
  type: ClusterIP
  ports:
  - port: 8001
    targetPort: http
    protocol: TCP
    name: http
  - port: 9001
    targetPort: grpc
    protocol: TCP
    name: grpc
  - port: 8081
    targetPort: websocket
    protocol: TCP
    name: websocket
  selector:
    {{- include "euvoice-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: stt-agent
---
{{- if .Values.sttAgent.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-stt-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: stt-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "euvoice-platform.fullname" . }}-stt-agent
  minReplicas: {{ .Values.sttAgent.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.sttAgent.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.sttAgent.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.sttAgent.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
  {{- if .Values.sttAgent.autoscaling.targetMemoryUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.sttAgent.autoscaling.targetMemoryUtilizationPercentage }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-stt-models
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: stt-agent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: 100Gi
{{- end }}