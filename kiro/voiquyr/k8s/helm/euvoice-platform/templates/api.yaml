{{- if .Values.api.enabled }}
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "euvoice-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "euvoice-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      {{- include "euvoice-platform.podSecurityContext" . | nindent 6 }}
      {{- include "euvoice-platform.affinity" . | nindent 6 }}
      containers:
      - name: api
        image: {{ include "euvoice-platform.image" (dict "repository" .Values.api.image.repository "tag" .Values.api.image.tag "Values" .Values) }}
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        {{- include "euvoice-platform.securityContext" . | nindent 8 }}
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        {{- include "euvoice-platform.complianceEnv" . | nindent 8 }}
        {{- range $k, $v := .Values.api.env }}
        - name: {{ $k }}
          value: {{ $v | quote }}
        {{- end }}
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: redis-url
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: jwt-secret-key
        - name: MISTRAL_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: mistral-api-key
              optional: true
        - name: DEEPGRAM_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: deepgram-api-key
              optional: true
        - name: ELEVENLABS_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: elevenlabs-api-key
              optional: true
        - name: STRIPE_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: stripe-api-key
              optional: true
        livenessProbe:
          httpGet:
            path: /api/v1/health/live
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        {{- include "euvoice-platform.resources" .Values.api | nindent 8 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  ports:
  - port: {{ .Values.api.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "euvoice-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
---
# ── HPA ───────────────────────────────────────────────────────────────────────
{{- if .Values.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "euvoice-platform.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
