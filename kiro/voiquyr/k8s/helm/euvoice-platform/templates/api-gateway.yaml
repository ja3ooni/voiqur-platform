{{- if .Values.apiGateway.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-api-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      {{- include "euvoice-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api-gateway
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "euvoice-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api-gateway
    spec:
      {{- include "euvoice-platform.podSecurityContext" . | nindent 6 }}
      {{- include "euvoice-platform.affinity" . | nindent 6 }}
      containers:
      - name: api-gateway
        image: {{ include "euvoice-platform.image" .Values.apiGateway.image }}
        imagePullPolicy: {{ .Values.apiGateway.image.pullPolicy }}
        {{- include "euvoice-platform.securityContext" . | nindent 8 }}
        ports:
        - name: http
          containerPort: {{ .Values.apiGateway.service.targetPort }}
          protocol: TCP
        - name: websocket
          containerPort: 8080
          protocol: TCP
        env:
        {{- include "euvoice-platform.complianceEnv" . | nindent 8 }}
        - name: STT_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-stt-agent:8001"
        - name: LLM_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-llm-agent:8002"
        - name: TTS_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-tts-agent:8003"
        - name: EMOTION_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-emotion-agent:8004"
        - name: ACCENT_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-accent-agent:8005"
        - name: LIPSYNC_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-lip-sync-agent:8006"
        - name: ARABIC_SERVICE_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-arabic-agent:8007"
        - name: FRAMEWORK_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-framework:8000"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "euvoice-platform.fullname" . }}-secrets
              key: jwt-secret
        - name: RATE_LIMIT_REQUESTS_PER_MINUTE
          value: "1000"
        - name: CORS_ORIGINS
          value: "https://dashboard.euvoice.ai,https://api.euvoice.ai"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        {{- include "euvoice-platform.resources" .Values.apiGateway | nindent 8 }}
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-api-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
  {{- with .Values.apiGateway.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
  - port: {{ .Values.apiGateway.service.port }}
    targetPort: {{ .Values.apiGateway.service.targetPort }}
    protocol: TCP
    name: https
  - port: 80
    targetPort: {{ .Values.apiGateway.service.targetPort }}
    protocol: TCP
    name: http
  - port: 8080
    targetPort: websocket
    protocol: TCP
    name: websocket
  selector:
    {{- include "euvoice-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
{{- end }}