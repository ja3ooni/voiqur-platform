{{- if .Values.ttsAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-tts-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts-agent
spec:
  replicas: {{ .Values.ttsAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "euvoice-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: tts-agent
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "euvoice-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: tts-agent
    spec:
      {{- include "euvoice-platform.podSecurityContext" . | nindent 6 }}
      {{- include "euvoice-platform.affinity" . | nindent 6 }}
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: tts-agent
        image: {{ include "euvoice-platform.image" .Values.ttsAgent.image }}
        imagePullPolicy: {{ .Values.ttsAgent.image.pullPolicy }}
        {{- include "euvoice-platform.securityContext" . | nindent 8 }}
        ports:
        - name: http
          containerPort: 8003
          protocol: TCP
        - name: grpc
          containerPort: 9003
          protocol: TCP
        - name: websocket
          containerPort: 8083
          protocol: TCP
        env:
        {{- include "euvoice-platform.complianceEnv" . | nindent 8 }}
        - name: FRAMEWORK_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-framework:8000"
        - name: MODEL_PRIMARY
          value: {{ .Values.ttsAgent.models.primary | quote }}
        - name: MODEL_ALTERNATIVES
          value: {{ join "," .Values.ttsAgent.models.alternatives | quote }}
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        {{- include "euvoice-platform.resources" .Values.ttsAgent | nindent 8 }}
        volumeMounts:
        - name: model-cache
          mountPath: /app/models
        - name: voice-cache
          mountPath: /app/voices
        - name: tmp
          mountPath: /tmp
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "euvoice-platform.fullname" . }}-tts-models
      - name: voice-cache
        persistentVolumeClaim:
          claimName: {{ include "euvoice-platform.fullname" . }}-voice-cache
      - name: tmp
        emptyDir: {}
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-tts-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts-agent
spec:
  type: ClusterIP
  ports:
  - port: 8003
    targetPort: http
    protocol: TCP
    name: http
  - port: 9003
    targetPort: grpc
    protocol: TCP
    name: grpc
  - port: 8083
    targetPort: websocket
    protocol: TCP
    name: websocket
  selector:
    {{- include "euvoice-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: tts-agent
---
{{- if .Values.ttsAgent.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-tts-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "euvoice-platform.fullname" . }}-tts-agent
  minReplicas: {{ .Values.ttsAgent.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.ttsAgent.autoscaling.maxReplicas }}
  metrics:
  {{- if .Values.ttsAgent.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.ttsAgent.autoscaling.targetCPUUtilizationPercentage }}
  {{- end }}
{{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-tts-models
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts-agent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-voice-cache
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: tts-agent
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.global.storageClass }}
  resources:
    requests:
      storage: 20Gi
{{- end }}