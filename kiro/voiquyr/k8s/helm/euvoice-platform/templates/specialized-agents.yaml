{{- if .Values.arabicAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-arabic-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: arabic-agent
spec:
  replicas: {{ .Values.arabicAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "euvoice-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: arabic-agent
  template:
    metadata:
      labels:
        {{- include "euvoice-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: arabic-agent
    spec:
      {{- include "euvoice-platform.podSecurityContext" . | nindent 6 }}
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      containers:
      - name: arabic-agent
        image: {{ include "euvoice-platform.image" .Values.arabicAgent.image }}
        {{- include "euvoice-platform.securityContext" . | nindent 8 }}
        ports:
        - name: http
          containerPort: 8007
        env:
        {{- include "euvoice-platform.complianceEnv" . | nindent 8 }}
        - name: FRAMEWORK_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-framework:8000"
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        {{- include "euvoice-platform.resources" .Values.arabicAgent | nindent 8 }}
        volumeMounts:
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-arabic-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: arabic-agent
spec:
  ports:
  - port: 8007
    targetPort: http
    name: http
  selector:
    {{- include "euvoice-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: arabic-agent
{{- end }}