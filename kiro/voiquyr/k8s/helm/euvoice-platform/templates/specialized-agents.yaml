{{- if .Values.emotionAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-emotion-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: emotion-agent
spec:
  replicas: {{ .Values.emotionAgent.replicaCount }}
  selector:
    matchLabels:
      {{- include "euvoice-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: emotion-agent
  template:
    metadata:
      labels:
        {{- include "euvoice-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: emotion-agent
    spec:
      {{- include "euvoice-platform.podSecurityContext" . | nindent 6 }}
      containers:
      - name: emotion-agent
        image: {{ include "euvoice-platform.image" .Values.emotionAgent.image }}
        {{- include "euvoice-platform.securityContext" . | nindent 8 }}
        ports:
        - name: http
          containerPort: 8004
        env:
        {{- include "euvoice-platform.complianceEnv" . | nindent 8 }}
        - name: FRAMEWORK_URL
          value: "http://{{ include "euvoice-platform.fullname" . }}-framework:8000"
        {{- include "euvoice-platform.resources" .Values.emotionAgent | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "euvoice-platform.fullname" . }}-emotion-agent
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "euvoice-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: emotion-agent
spec:
  ports:
  - port: 8004
    targetPort: http
    name: http
  selector:
    {{- include "euvoice-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: emotion-agent
{{- end }}
---
