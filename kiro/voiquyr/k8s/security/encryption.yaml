# Encryption configurations for EUVoice AI Platform
# Implements data encryption at rest and in transit for EU compliance

# Encryption at rest configuration using AWS KMS
apiVersion: v1
kind: Secret
metadata:
  name: euvoice-encryption-config
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
type: Opaque
data:
  # KMS key ID for EU region (base64 encoded)
  kms-key-id: {{ "arn:aws:kms:eu-central-1:ACCOUNT:key/12345678-1234-1234-1234-123456789012" | b64enc }}
  # Encryption key for application-level encryption
  app-encryption-key: {{ randAlphaNum 32 | b64enc }}
  # Database encryption key
  db-encryption-key: {{ randAlphaNum 32 | b64enc }}
---
# EncryptionConfiguration for etcd encryption
apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
- resources:
  - secrets
  - configmaps
  providers:
  - aescbc:
      keys:
      - name: key1
        secret: {{ randAlphaNum 32 | b64enc }}
  - identity: {}
- resources:
  - events
  providers:
  - identity: {}
---
# StorageClass with encryption enabled
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3-encrypted
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  encrypted: "true"
  kmsKeyId: "arn:aws:kms:eu-central-1:ACCOUNT:key/12345678-1234-1234-1234-123456789012"
  fsType: ext4
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# TLS certificates for internal communication
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: euvoice-ca-issuer
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  ca:
    secretName: euvoice-ca-key-pair
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: euvoice-internal-tls
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  secretName: euvoice-internal-tls
  issuerRef:
    name: euvoice-ca-issuer
    kind: ClusterIssuer
  commonName: "*.euvoice.svc.cluster.local"
  dnsNames:
  - "*.euvoice.svc.cluster.local"
  - "euvoice-platform-framework.euvoice.svc.cluster.local"
  - "euvoice-platform-stt-agent.euvoice.svc.cluster.local"
  - "euvoice-platform-llm-agent.euvoice.svc.cluster.local"
  - "euvoice-platform-tts-agent.euvoice.svc.cluster.local"
  - "euvoice-platform-api-gateway.euvoice.svc.cluster.local"
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
---
# External TLS certificate for public endpoints
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: euvoice-external-tls
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  secretName: euvoice-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: "api.euvoice.ai"
  dnsNames:
  - "api.euvoice.ai"
  - "dashboard.euvoice.ai"
  - "*.euvoice.ai"
  duration: 2160h # 90 days
  renewBefore: 720h # 30 days
---
# ConfigMap for TLS configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: euvoice-tls-config
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
data:
  tls.conf: |
    # TLS configuration for EU compliance
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    
    # EU compliance headers
    add_header X-GDPR-Compliant "true" always;
    add_header X-Data-Residency "EU" always;
    add_header X-Encryption-Status "enabled" always;
---
# Sealed Secrets configuration for GitOps
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: euvoice-sealed-secrets
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  encryptedData:
    # These would be encrypted with the sealed secrets controller
    database-password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEQAx...
    redis-password: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEQAx...
    jwt-secret: AgBy3i4OJSWK+PiTySYZZA9rO43cGDEQAx...
  template:
    metadata:
      name: euvoice-sealed-secrets
      namespace: euvoice
    type: Opaque
---
# Vault configuration for secret management
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: euvoice
  labels:
    app: vault
    compliance.euvoice.ai/gdpr: "enabled"
data:
  vault.hcl: |
    ui = true
    
    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_cert_file = "/vault/tls/tls.crt"
      tls_key_file = "/vault/tls/tls.key"
      tls_min_version = "tls12"
    }
    
    storage "postgresql" {
      connection_url = "postgres://vault:password@postgres:5432/vault?sslmode=require"
      table = "vault_kv_store"
      max_parallel = "128"
    }
    
    seal "awskms" {
      region = "eu-central-1"
      kms_key_id = "arn:aws:kms:eu-central-1:ACCOUNT:key/12345678-1234-1234-1234-123456789012"
    }
    
    # EU compliance configuration
    log_level = "INFO"
    log_format = "json"
    
    # Audit logging for GDPR compliance
    audit {
      file {
        file_path = "/vault/logs/audit.log"
        log_raw = false
        format = "json"
      }
    }
    
    # API rate limiting
    api_addr = "https://vault.euvoice.svc.cluster.local:8200"
    cluster_addr = "https://vault.euvoice.svc.cluster.local:8201"
    
    # Telemetry for monitoring
    telemetry {
      prometheus_retention_time = "30s"
      disable_hostname = true
    }
---
# External Secrets Operator configuration
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: euvoice-vault-backend
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  provider:
    vault:
      server: "https://vault.euvoice.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "euvoice-role"
          serviceAccountRef:
            name: "euvoice-framework"
      caBundle: |
        -----BEGIN CERTIFICATE-----
        # CA certificate for Vault TLS
        -----END CERTIFICATE-----
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: euvoice-external-secrets
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: euvoice-vault-backend
    kind: SecretStore
  target:
    name: euvoice-vault-secrets
    creationPolicy: Owner
  data:
  - secretKey: database-password
    remoteRef:
      key: database
      property: password
  - secretKey: redis-password
    remoteRef:
      key: redis
      property: password
  - secretKey: jwt-secret
    remoteRef:
      key: auth
      property: jwt-secret
  - secretKey: encryption-key
    remoteRef:
      key: encryption
      property: master-key