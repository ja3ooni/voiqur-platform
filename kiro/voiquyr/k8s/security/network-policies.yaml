---
# API Gateway network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-api-gateway-policy
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: api-gateway
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: api-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  # Allow ingress from Istio gateway
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 8080
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
  egress:
  # Allow egress to all agents
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: euvoice-platform
    ports:
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 8002
    - protocol: TCP
      port: 8003
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 8007
  # Allow egress to Framework
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: multi-agent-framework
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9000
---
# Frontend network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-frontend-policy
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: frontend
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  # Allow ingress from Istio gateway
  - from:
    - namespaceSelector:
        matchLabels:
          name: istio-system
    ports:
    - protocol: TCP
      port: 3000
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3000
  egress:
  # Frontend is static, minimal egress needed
  # Only allow egress for health checks and CDN
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
# Specialized agents network policies
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-specialized-agents-policy
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector:
    matchExpressions:
    - key: app.kubernetes.io/component
      operator: In
      values: ["emotion-agent", "accent-agent", "lip-sync-agent", "arabic-agent"]
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from core agents
  - from:
    - podSelector:
        matchExpressions:
        - key: app.kubernetes.io/component
          operator: In
          values: ["stt-agent", "llm-agent", "tts-agent", "api-gateway"]
    ports:
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 8007
  # Allow ingress from Framework
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: multi-agent-framework
    ports:
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 8007
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
  egress:
  # Allow egress to Framework
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: multi-agent-framework
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9000
  # Allow HTTPS egress for model downloads (EU regions only)
  - to: []
    ports:
    - protocol: TCP
      port: 443