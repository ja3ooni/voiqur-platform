# Network Policies for EUVoice AI Platform
# Implements micro-segmentation and EU compliance network security

# Default deny all ingress and egress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-default-deny-all
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow DNS resolution for all pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-allow-dns
  namespace: euvoice
  labels:
    app: euvoice-platform
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
# Multi-Agent Framework network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-framework-policy
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: multi-agent-framework
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: multi-agent-framework
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from all agents
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: euvoice-platform
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9000
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
  egress:
  # Allow egress to database
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
    ports:
    - protocol: TCP
      port: 5432
  # Allow egress to Redis
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow egress to all agents
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: euvoice-platform
    ports:
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 8002
    - protocol: TCP
      port: 8003
    - protocol: TCP
      port: 8004
    - protocol: TCP
      port: 8005
    - protocol: TCP
      port: 8006
    - protocol: TCP
      port: 8007
---
# STT Agent network policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: euvoice-stt-agent-policy
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: stt-agent
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: stt-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow ingress from API Gateway
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: api-gateway
    ports:
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 9001
    - protocol: TCP
      port: 8081
  # Allow ingress from Framework
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: multi-agent-framework
    ports:
    - protocol: TCP
      port: 8001
    - protocol: TCP
      port: 9001
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8001
  egress:
  # Allow egress to Framework
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: multi-agent-framework
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 9000
  # Allow egress to Accent Agent
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: accent-agent
    ports:
    - protocol: TCP
      port: 8005
  # Allow egress to Emotion Agent
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/component: emotion-agent
    ports:
    - protocol: TCP
      port: 8004
  # Allow HTTPS egress for model downloads (EU regions only)
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
