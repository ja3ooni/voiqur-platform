# Horizontal Pod Autoscaler configurations for EUVoice AI Platform
# These HPAs provide intelligent scaling based on multiple metrics

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: euvoice-stt-agent-hpa
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: stt-agent
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: euvoice-platform-stt-agent
  minReplicas: 2
  maxReplicas: 20
  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  # GPU-based scaling
  - type: Resource
    resource:
      name: nvidia.com/gpu
      target:
        type: Utilization
        averageUtilization: 85
  # Custom metrics for voice processing
  - type: Pods
    pods:
      metric:
        name: stt_queue_length
      target:
        type: AverageValue
        averageValue: "10"
  - type: Pods
    pods:
      metric:
        name: stt_processing_latency_seconds
      target:
        type: AverageValue
        averageValue: "0.05"  # 50ms
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 4
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: euvoice-llm-agent-hpa
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: llm-agent
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: euvoice-platform-llm-agent
  minReplicas: 2
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85
  - type: Resource
    resource:
      name: nvidia.com/gpu
      target:
        type: Utilization
        averageUtilization: 80
  # LLM-specific metrics
  - type: Pods
    pods:
      metric:
        name: llm_queue_length
      target:
        type: AverageValue
        averageValue: "5"
  - type: Pods
    pods:
      metric:
        name: llm_context_memory_usage_bytes
      target:
        type: AverageValue
        averageValue: "8Gi"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 600  # Longer for LLM due to model loading time
      policies:
      - type: Percent
        value: 10
        periodSeconds: 120
      selectPolicy: Min
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
      - type: Percent
        value: 100
        periodSeconds: 60
      - type: Pods
        value: 3
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: euvoice-tts-agent-hpa
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: tts-agent
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: euvoice-platform-tts-agent
  minReplicas: 2
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: nvidia.com/gpu
      target:
        type: Utilization
        averageUtilization: 85
  # TTS-specific metrics
  - type: Pods
    pods:
      metric:
        name: tts_queue_length
      target:
        type: AverageValue
        averageValue: "8"
  - type: Pods
