---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: euvoice-framework-vpa
  namespace: euvoice
  labels:
    app: euvoice-platform
    component: multi-agent-framework
    compliance.euvoice.ai/gdpr: "enabled"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: euvoice-platform-framework
  updatePolicy:
    updateMode: "Auto"
    minReplicas: 3
  resourcePolicy:
    containerPolicies:
    - containerName: framework
      minAllowed:
        cpu: 1
        memory: 2Gi
      maxAllowed:
        cpu: 8
        memory: 16Gi
      controlledResources: ["cpu", "memory"]
      controlledValues: RequestsAndLimits